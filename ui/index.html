<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JazzCat</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">JazzCat v0.4</p>
          <h1 id="tune-title">JazzCat</h1>
        </div>
        <dl class="meta-strip" aria-label="Tune metadata">
          <div>
            <dt>Composer</dt>
            <dd id="meta-composer">-</dd>
          </div>
          <div>
            <dt>Key</dt>
            <dd id="meta-key">-</dd>
          </div>
          <div>
            <dt>Style</dt>
            <dd id="meta-style">-</dd>
          </div>
          <div>
            <dt>Form</dt>
            <dd id="meta-form">-</dd>
          </div>
          <div>
            <dt>Tempo</dt>
            <dd id="meta-tempo">-</dd>
          </div>
          <div>
            <dt>Shift</dt>
            <dd id="meta-shift">0</dd>
          </div>
          <div>
            <dt>Regions</dt>
            <dd id="meta-regions">-</dd>
          </div>
        </dl>
      </header>

      <section class="import-panel" aria-label="Import chart">
        <div class="import-control">
          <label for="demo-select">Demo Tune</label>
          <div class="inline-control">
            <select id="demo-select"></select>
            <button id="load-demo-button" type="button">Load</button>
          </div>
        </div>

        <div class="import-control paste-control">
          <label for="ireal-input">Paste iReal Link</label>
          <textarea id="ireal-input" rows="3" spellcheck="false"></textarea>
          <button id="analyse-paste-button" type="button">Analyse</button>
        </div>

        <div class="import-control">
          <label for="html-file-input">Upload HTML</label>
          <div class="inline-control">
            <input id="html-file-input" type="file" accept=".html,text/html" />
            <button id="analyse-upload-button" type="button">Analyse</button>
          </div>
        </div>

        <div class="import-control plain-text-control">
          <label for="plain-title-input">Plain Text Title</label>
          <input id="plain-title-input" type="text" placeholder="Untitled Progression" />
        </div>

        <div class="import-control plain-text-control">
          <label for="plain-key-input">Declared Key</label>
          <input id="plain-key-input" type="text" placeholder="Optional, e.g. C major" />
        </div>

        <div class="import-control plain-text-area-control">
          <label for="plain-text-input">Plain Text Chords</label>
          <textarea id="plain-text-input" rows="4" spellcheck="false">Title: Untitled Study
Key: C major
Form: AABA
A:
| Dm7 G7 | Cmaj7 | / | Cmaj7 |
Bridge:
| E7 A7 | D7 G7 | Cmaj7 | Cmaj7 |</textarea>
          <button id="analyse-plain-text-button" type="button">Analyse Plain Text</button>
        </div>
      </section>

      <section class="status-row" aria-live="polite">
        <div id="warning-list" class="warning-list"></div>
        <span id="ireal-status" class="status-pill">iReal preserved</span>
      </section>

      <section class="workbench" aria-label="Harmony workbench">
        <section class="chart-panel" aria-label="Chord chart">
          <div class="section-heading">
            <h2>Lead Sheet</h2>
            <div class="transpose-controls" aria-label="Transpose chart">
              <button id="transpose-down" type="button" aria-label="Transpose down semitone">-</button>
              <span id="transpose-label">Shift 0</span>
              <button id="transpose-up" type="button" aria-label="Transpose up semitone">+</button>
              <button id="transpose-reset" type="button">Reset</button>
            </div>
          </div>
          <div id="chart-grid" class="chart-grid"></div>
        </section>

        <section class="region-panel" aria-label="Regions and selected analysis">
          <div class="section-heading">
            <h2>Regions</h2>
            <span id="confidence-summary" class="quiet-text"></span>
          </div>
          <div id="harmony-map" class="harmony-map"></div>
          <div id="region-list" class="region-list"></div>
          <div id="region-detail" class="region-detail"></div>
        </section>
      </section>

      <section class="lower-grid" aria-label="Practice and payload">
        <section class="practice-panel" aria-label="Practice Mode">
          <div class="section-heading">
            <h2>Practice Mode</h2>
            <div class="pack-actions">
              <select id="key-trainer-mode" aria-label="Key trainer mode">
                <option value="original">Original</option>
                <option value="up_whole_step">Up whole step</option>
                <option value="down_minor_third">Down minor third</option>
                <option value="cycle_of_fourths">Cycle of fourths</option>
                <option value="random_3_keys">Random 3 keys</option>
              </select>
              <button id="copy-pack-button" type="button">Copy JSON</button>
              <button id="download-pack-button" type="button">Download JSON</button>
            </div>
          </div>
          <div id="practice-list" class="practice-list"></div>
          <div id="key-trainer-list" class="key-trainer-list"></div>
          <div class="practice-notes">
            <label for="practice-notes-input">Tune Notes / Practice Notes</label>
            <textarea id="practice-notes-input" rows="4" spellcheck="true" placeholder="Add your own practice notes here."></textarea>
          </div>
        </section>

        <section class="payload-panel" aria-label="iReal payload">
          <div class="section-heading">
            <h2>Payload</h2>
            <span id="payload-length" class="quiet-text"></span>
          </div>
          <pre id="payload-preview"></pre>
        </section>
      </section>
    </main>

    <script src="./preview-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
